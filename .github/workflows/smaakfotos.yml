name: Genereer smaakfoto's

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Aantal flessen per run (kostenbeheersing)"
        type: choice
        options: ["1", "10"]
        default: "1"
      handle:
        description: "1 specifieke fles (URL-slug). Ingevuld = alleen deze fles"
        type: string
        default: ""
      dry_run:
        description: "Dry-run: wel genereren (kost credits) + artifact, niet uploaden/taggen"
        type: boolean
        default: true
      image_model:
        description: "Beeldmodel"
        type: choice
        options: ["gpt-image-1.5", "gpt-image-1-mini", "gpt-image-2"]
        default: "gpt-image-1.5"
      image_quality:
        description: "Kwaliteit"
        type: choice
        options: ["low", "medium", "high"]
        default: "high"
      flavor_size:
        description: "Grootte van de smaken in px (subtiliteit)"
        type: choice
        options: ["220", "260", "320", "400", "480", "560"]
        default: "260"
      merge_colors:
        description: "Kleur/rijpheid samenvoegen (rode+zwarte kers -> kers) — goedkoper"
        type: boolean
        default: true
      cutout_source:
        description: "Bron van de smaakbeelden"
        type: choice
        options: ["gpt", "stock"]
        default: "gpt"
      bypass_cache:
        description: "Cache negeren en smaken opnieuw maken (ook bij gpt)"
        type: boolean
        default: false

jobs:
  smaakfotos:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # nodig om de cache-map terug te committen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installeer dependencies
        run: pip install -r requirements.txt

      # Nodig voor stock-modus én voor gpt-image-2 (achtergrond wegknippen)
      - name: Installeer rembg
        if: ${{ inputs.cutout_source == 'stock' || inputs.image_model == 'gpt-image-2' }}
        run: pip install rembg onnxruntime

      - name: Genereer smaakfoto's
        env:
          SHOP: ${{ secrets.SHOP }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BATCH_SIZE: ${{ inputs.batch_size }}
          HANDLE: ${{ inputs.handle }}
          DRY_RUN: ${{ inputs.dry_run }}
          OPENAI_IMAGE_MODEL: ${{ inputs.image_model }}
          IMAGE_QUALITY: ${{ inputs.image_quality }}
          FLAVOR_PX: ${{ inputs.flavor_size }}
          MERGE_COLOR_VARIANTS: ${{ inputs.merge_colors }}
          CUTOUT_SOURCE: ${{ inputs.cutout_source }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          BYPASS_CACHE: ${{ inputs.bypass_cache }}
        run: python smaakfoto_generator.py

      - name: Gegenereerde foto's als artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smaakfotos
          path: backup_smaak/
          if-no-files-found: ignore

      - name: Commit smaak-uitsnedes naar de repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flavor_cache flavor_meta.json
          if git diff --cached --quiet; then
            echo "Geen nieuwe of gewijzigde uitsnedes/smaken om te committen."
          else
            git commit -m "Smaak-uitsnedes bijgewerkt [skip ci]"
            git pull --rebase --autostash
            git push
          fi
