name: Genereer smaakfoto's

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Aantal flessen per run (kostenbeheersing)"
        type: choice
        options: ["1", "10", "25", "50", "100", "alle"]
        default: "1"
      handle:
        description: "1 specifieke fles (URL-slug). Ingevuld = alleen deze fles"
        type: string
        default: ""
      wijnhuis:
        description: "Alle wijnen van 1 wijnhuis (deelstring van de producentnaam, bv. 'Marqués de Murrieta'). Overstemt batch_size"
        type: string
        default: ""
      aroma_stijl:
        description: "Stijl van de smaakfoto"
        type: choice
        options: ["kolommen", "krans", "explosie", "geometrisch", "constellatie", "aromawolk", "kleurverloop", "rook"]
        default: "aromawolk"
      overwrite:
        description: "Bestaande smaakfoto's vervangen (selecteert producten MET de tag)"
        type: boolean
        default: false
      dry_run:
        description: "Dry-run: wel genereren (kost credits) + artifact, niet uploaden/taggen"
        type: boolean
        default: true
      image_model:
        description: "Beeldmodel"
        type: choice
        options: ["gpt-image-1.5", "gpt-image-1-mini", "gpt-image-2"]
        default: "gpt-image-1.5"
      image_quality:
        description: "Kwaliteit"
        type: choice
        options: ["low", "medium", "high"]
        default: "high"
      flavor_size:
        description: "Grootte van de smaken in px (subtiliteit)"
        type: choice
        options: ["220", "260", "320", "400", "480", "560"]
        default: "320"
      merge_colors:
        description: "Kleur/rijpheid samenvoegen (rode+zwarte kers -> kers) — goedkoper"
        type: boolean
        default: true
      bypass_cache:
        description: "Cache negeren en smaken opnieuw maken (ook bij gpt)"
        type: boolean
        default: false

jobs:
  voorcalculatie:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installeer dependencies
        run: pip install -r requirements.txt

      - name: Bereken welke OpenAI-calls nodig zijn (géén calls, alleen tellen)
        env:
          PYTHONUNBUFFERED: "1"
          SHOP: ${{ secrets.SHOP }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          PREFLIGHT_ONLY: "true"
          BATCH_SIZE: ${{ inputs.batch_size }}
          HANDLE: ${{ inputs.handle }}
          WIJNHUIS: ${{ inputs.wijnhuis }}
          OPENAI_IMAGE_MODEL: ${{ inputs.image_model }}
          IMAGE_QUALITY: ${{ inputs.image_quality }}
          AROMA_STYLE: ${{ inputs.aroma_stijl }}
          OVERWRITE: ${{ inputs.overwrite }}
        run: python smaakfoto_generator.py

  genereren:
    needs: voorcalculatie
    runs-on: ubuntu-latest
    # Deze environment pauzeert de run en toont een "Review deployments"-knop, zichtbaar in de
    # Actions-run naast het log van de voorcalculatie hierboven. Pas GEEN OpenAI-call gebeurt
    # voordat een reviewer op Approve klikt. Eenmalige instelling: Settings -> Environments ->
    # New environment "openai-approval" -> vink "Required reviewers" aan en voeg jezelf toe.
    environment: openai-approval
    permissions:
      contents: write        # nodig om de cache-map terug te committen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Installeer dependencies
        run: pip install -r requirements.txt

      # Nodig voor stock-modus én voor gpt-image-2 (achtergrond wegknippen)
      - name: Installeer rembg
        if: ${{ inputs.image_model == 'gpt-image-2' }}
        run: pip install rembg onnxruntime

      - name: Genereer smaakfoto's
        env:
          PYTHONUNBUFFERED: "1"
          SHOP: ${{ secrets.SHOP }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BATCH_SIZE: ${{ inputs.batch_size }}
          HANDLE: ${{ inputs.handle }}
          WIJNHUIS: ${{ inputs.wijnhuis }}
          DRY_RUN: ${{ inputs.dry_run }}
          OPENAI_IMAGE_MODEL: ${{ inputs.image_model }}
          IMAGE_QUALITY: ${{ inputs.image_quality }}
          FLAVOR_PX: ${{ inputs.flavor_size }}
          MERGE_COLOR_VARIANTS: ${{ inputs.merge_colors }}
          AROMA_STYLE: ${{ inputs.aroma_stijl }}
          OVERWRITE: ${{ inputs.overwrite }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          BYPASS_CACHE: ${{ inputs.bypass_cache }}
        run: python smaakfoto_generator.py

      - name: Gegenereerde foto's als artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smaakfotos
          path: backup_smaak/
          if-no-files-found: ignore

      - name: Commit smaak-uitsnedes naar de repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flavor_cache flavor_meta.json
          if git diff --cached --quiet; then
            echo "Geen nieuwe of gewijzigde uitsnedes/smaken om te committen."
          else
            git commit -m "Smaak-uitsnedes bijgewerkt [skip ci]"
            git pull --rebase --autostash
            git push
          fi
