name: Opschonen

# Eenmalig: seedt ontbrekende canonieke cutouts, snoeit de cache, en verwijdert
# stale bestanden + afgeronde eenmalige acties. Daarna mag je opschonen.py en
# dit workflow-bestand zelf ook verwijderen.
on:
  workflow_dispatch:
    inputs:
      source:
        description: "Welke bron-cutouts behouden (gpt of stock)"
        type: choice
        options: ["gpt", "stock"]
        default: "gpt"

jobs:
  opschonen:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Opschonen uitvoeren
        env:
          CUTOUT_SOURCE: ${{ inputs.source }}
        run: python opschonen.py

      - name: Commit opschoning naar de repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Niets op te schonen."
          else
            git commit -m "Repo opgeschoond: cache gesnoeid, stale bestanden en eenmalige acties verwijderd [skip ci]"
            git pull --rebase --autostash
            git push
          fi
