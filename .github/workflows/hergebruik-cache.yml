name: Cutouts hergebruiken

# Eenmalig: vult ontbrekende canonieke cutouts door bestaande gelijkwaardige
# te kopieren (bespaart generaties). Daarna mag dit bestand blijven of weg.
on:
  workflow_dispatch:
    inputs:
      source:
        description: "Welke bron-cutouts hergebruiken"
        type: choice
        options: ["gpt", "stock"]
        default: "gpt"

jobs:
  hergebruik:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Kopieer bestaande cutouts naar canonieke namen
        env:
          CUTOUT_SOURCE: ${{ inputs.source }}
        run: python hergebruik_cache.py

      - name: Commit naar de repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flavor_cache
          if git diff --cached --quiet; then
            echo "Niets om te committen."
          else
            git commit -m "Cutouts hergebruikt naar canonieke namen [skip ci]"
            git pull --rebase --autostash
            git push
          fi
