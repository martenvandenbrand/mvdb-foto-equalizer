name: Migreer oude cache naar repo

# EENMALIG bedoeld: haalt de smaak-uitsnedes uit de oude GitHub Actions-cache
# en commit ze naar flavor_cache/ in de repo. Daarna mag je dit bestand verwijderen.
on:
  workflow_dispatch:

jobs:
  migreer:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Herstelt de meest recente cache waarvan de sleutel met 'flavor-cache-' begint.
      - name: Herstel oude Actions-cache
        uses: actions/cache/restore@v4
        with:
          path: flavor_cache
          key: flavor-cache-migratie      # matcht bewust niet exact -> valt terug op restore-keys
          restore-keys: flavor-cache-

      - name: Toon wat er hersteld is
        run: ls -la flavor_cache || echo "flavor_cache is leeg / niet gevonden"

      - name: Commit naar de repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flavor_cache
          if git diff --cached --quiet; then
            echo "Niets nieuws uit de cache om te committen."
          else
            git commit -m "Oude smaak-cache naar repo gemigreerd [skip ci]"
            git pull --rebase --autostash
            git push
          fi
